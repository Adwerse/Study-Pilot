name: Deploy Backend and Bot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['backend/**', 'bot/**', '.github/workflows/deploy-backend.yml']

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy backend to Railway
        run: npx -y @railway/cli up backend --service backend --ci --path-as-root
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-bot:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy bot to Railway
        run: npx -y @railway/cli up bot --service bot --ci --path-as-root
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
