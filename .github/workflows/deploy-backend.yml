name: Deploy Backend and Bot

on:
  push:
    branches: [main]
    paths: ['backend/**', 'bot/**']

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare backend deploy context
        run: cp -a backend/. .
      - name: Deploy backend to Railway
        uses: bervProject/railway-deploy@0.2.0-beta
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: backend

  deploy-bot:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - name: Prepare bot deploy context
        run: cp -a bot/. .
      - name: Deploy bot to Railway
        uses: bervProject/railway-deploy@0.2.0-beta
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: bot
