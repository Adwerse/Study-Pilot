name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Check dist exists
        run: test -d dist && echo "dist OK"

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      SECRET_KEY: ci-secret-key
      OPENAI_API_KEY: ci-openai-key
      BOT_TOKEN: 123456:TEST_TOKEN
      MINI_APP_URL: https://example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ hashFiles('backend/requirements.txt') }}
      - run: python -m venv .venv && .venv/bin/pip install -r requirements.txt
      - run: .venv/bin/ruff check app/
      - run: .venv/bin/ruff format --check app/
      - run: .venv/bin/pytest tests/ -v

  bot-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    env:
      BOT_TOKEN: 123456:TEST_TOKEN
      MINI_APP_URL: https://example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m venv .venv && .venv/bin/pip install -r requirements.txt
      - run: .venv/bin/python -c "import main; print('bot import OK')"
