services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learning_os}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learning_os}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - ./backend/migrations:/migrations:ro
      - ./deploy/run-migrations.sh:/run-migrations.sh:ro
    command: sh /run-migrations.sh

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      TESTING: "false"
      TEST_AUTH_ENABLED: "false"
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-learning_os}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-tensorix}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      TENSORIX_API_KEY: ${TENSORIX_API_KEY:-}
      TENSORIX_BASE_URL: ${TENSORIX_BASE_URL:-https://api.tensorix.ai/v1}
      TENSORIX_MODEL: ${TENSORIX_MODEL:-deepseek/deepseek-chat-v3.1}
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      TELEGRAM_BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      MINI_APP_URL: https://${APP_DOMAIN:?set APP_DOMAIN}
      ALLOWED_ORIGINS: '["https://${APP_DOMAIN:?set APP_DOMAIN}"]'
      INTERNAL_JOBS_SECRET: ${INTERNAL_JOBS_SECRET:?set INTERNAL_JOBS_SECRET}
      DEBUG: ${APP_DEBUG:-false}
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-true}
      NOTIFICATIONS_POLL_INTERVAL_SECONDS: ${NOTIFICATIONS_POLL_INTERVAL_SECONDS:-30}
      WEEKLY_DIGEST_ENABLED: ${WEEKLY_DIGEST_ENABLED:-true}
      WEEKLY_DIGEST_DAY: ${WEEKLY_DIGEST_DAY:-6}
      WEEKLY_DIGEST_HOUR: ${WEEKLY_DIGEST_HOUR:-18}
      WEEKLY_DIGEST_POLL_INTERVAL_SECONDS: ${WEEKLY_DIGEST_POLL_INTERVAL_SECONDS:-900}
      WEEKLY_DIGEST_BATCH_LIMIT: ${WEEKLY_DIGEST_BATCH_LIMIT:-100}
      DOCUMENT_MAX_FILE_SIZE_BYTES: ${DOCUMENT_MAX_FILE_SIZE_BYTES:-10485760}
      DOCUMENT_CHUNK_SIZE_CHARS: ${DOCUMENT_CHUNK_SIZE_CHARS:-1600}
      DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-200}
      DOCUMENT_MAX_CHUNKS: ${DOCUMENT_MAX_CHUNKS:-500}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      VECTOR_STORE_PROVIDER: ${VECTOR_STORE_PROVIDER:-pgvector}
      VECTOR_SEARCH_TOP_K_DEFAULT: ${VECTOR_SEARCH_TOP_K_DEFAULT:-8}
      VECTOR_SEARCH_SCORE_THRESHOLD: ${VECTOR_SEARCH_SCORE_THRESHOLD:-0.2}
      RAG_REWRITE_MODEL: ${RAG_REWRITE_MODEL:-deepseek/deepseek-chat-v3.1}
      RAG_ANSWER_MODEL: ${RAG_ANSWER_MODEL:-deepseek/deepseek-chat-v3.1}
      RAG_TOP_K_DEFAULT: ${RAG_TOP_K_DEFAULT:-8}
      RAG_RERANK_TOP_K_DEFAULT: ${RAG_RERANK_TOP_K_DEFAULT:-4}
      RAG_MIN_SCORE_THRESHOLD: ${RAG_MIN_SCORE_THRESHOLD:-0.2}
      RAG_MAX_CONTEXT_CHARS: ${RAG_MAX_CONTEXT_CHARS:-12000}
      RAG_SNIPPET_CHARS: ${RAG_SNIPPET_CHARS:-300}
      ANALYTICS_AI_ENABLED: ${ANALYTICS_AI_ENABLED:-true}
      ANALYTICS_MODEL: ${ANALYTICS_MODEL:-}
      WEEKLY_REVIEW_AI_ENABLED: ${WEEKLY_REVIEW_AI_ENABLED:-true}
      WEEKLY_REVIEW_MODEL: ${WEEKLY_REVIEW_MODEL:-}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  bot:
    build:
      context: ./bot
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      MINI_APP_URL: https://${APP_DOMAIN:?set APP_DOMAIN}
      USE_WEBHOOK: "false"
      DEBUG: ${APP_DEBUG:-false}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://${API_DOMAIN:?set API_DOMAIN}
    restart: unless-stopped
    environment:
      PORT: 4173
    expose:
      - "4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
