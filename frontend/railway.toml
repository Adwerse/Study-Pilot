[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c \"export PORT=${PORT:-4173}; envsubst '$PORT' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'\""
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on-failure"
